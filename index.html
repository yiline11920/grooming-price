        "giant": { "short": [1200, 1700], "med_long": [1500, 2000], "long": [2000, 2500] },
        "super_giant": { "short": [1500, 2100], "med_long": [2000, 2500], "long": [2500, 3200] },
        
        // 貓咪專屬價格矩陣
        "cat_small": { "short": [700, 1200], "med_long": [800, 1300], "long": [800, 1300] },
        "cat_medium": { "short": [1000, 1200], "med_long": [1200, 1400], "long": [1200, 1400] },
        "cat_large": { "short": [1200, 1600], "med_long": [1400, 1800], "long": [1400, 1800] }
    };

    const hairLabels = { "short": "短毛", "med_long": "中長毛", "long": "長毛" };
    
    const sizeLabels = {
        "small": "犬・小型 (25cm↓)",
        "med_small": "犬・中小型 (26-35cm)",
        "medium": "犬・中型 (36-45cm)",
        "med_large": "犬・中大型 (46-55cm)",
        "large": "犬・大型 (56-65cm)",
        "giant": "犬・巨型 (66-75cm)",
        "super_giant": "犬・特大型 (76cm↑)",
        "cat_small": "貓・小型 (25cm↓)",
        "cat_medium": "貓・中型 (26-40cm)",
        "cat_large": "貓・大型 (41cm↑)"
    };

    function getAddonPrice(addonName, sizeCategory) {
        // 判斷體型級距
        const isMedium = sizeCategory === "medium";
        const isMedLarge = sizeCategory === "med_large";
        const isLargeOrAbove = ["large", "giant", "super_giant"].includes(sizeCategory);
        const isMedLargeOrAbove = isMedLarge || isLargeOrAbove;
        const isMediumOrAbove = isMedium || isMedLargeOrAbove;

        // 1. 全體型固定價格的項目
        if (["拆結", "特殊造型"].includes(addonName)) return 100;
        if (addonName === "口腔+足部護理優惠") return 129;

        // 2. 基礎單項服務
        const basicSingleItems = ["剪指甲", "腳底毛", "清耳朵", "拔耳毛", "剃肚子毛", "肛門腺", "口腔護理", "足部護理"];
        if (basicSingleItems.includes(addonName)) {
            return isLargeOrAbove ? 150 : 100;
        }

        // 3. 剃肛門毛
        if (addonName === "剃肛門毛") {
            return isMedLargeOrAbove ? 100 : 50;
        }

        // 4. SPA與護理
        const standardCareItems = [
            "深層皮脂清潔", "驅蚤 犬用/貓用", "尤加利洗/養護", 
            "喜馬拉雅岩鹽", "護膚寶(犬.喵)", "安紅抗癢"
        ];
        if (standardCareItems.includes(addonName)) {
            if (isLargeOrAbove) return 200;
            if (isMedLarge) return 150;
            return 100;
        }

        // 5. 特定加價洗浴、SPA
        if (addonName === "薑接spa") {
            if (isLargeOrAbove) return 500; // 大型犬以上調整為 500
            if (isMediumOrAbove) return 400;
            return 300;
        }
        if (addonName === "椰子碳酸錠淋浴") {
            if (isLargeOrAbove) return 300;
            if (isMediumOrAbove) return 200;
            return 150;
        }
        if (addonName === "乳酸碳酸錠+護毛優惠套組") {
            if (isLargeOrAbove) return 299;
            if (isMediumOrAbove) return 239;
            return 199;
        }

        // 6. 基礎造型加價
        const standardStylingItems = ["貴賓腳", "貴賓臉", "腳靴", "頭部修剪"];
        if (standardStylingItems.includes(addonName)) {
            if (isLargeOrAbove) return 200;
            if (isMediumOrAbove) return 150;
            return 100;
        }

        // 7. 進階造型與其他加價 (腳柱、腳球、手吹)
        if (addonName === "腳柱") {
            if (isLargeOrAbove) return 350;
            if (isMedLarge) return 250;
            if (isMedium) return 200;
            return 150;
        }
        if (addonName === "腳球") {
            if (isLargeOrAbove) return 250;
            if (isMedLarge) return 150;
            return 100;
        }
        if (addonName === "手吹") {
            if (isLargeOrAbove) return 300;
            if (isMedLarge) return 200;
            if (isMedium) return 150;
            return 100;
        }

        return 0;
    }

    let currentHairType = "";
    let currentSpecies = "dog"; // 追蹤目前是狗還是貓
    let selectedAddons = [];

    function addAddon() {
        const select = document.getElementById("addonSelect");
        const val = select.value;
        if (val && !selectedAddons.includes(val)) {
            selectedAddons.push(val);
            calculatePrice();
        }
        select.value = ""; 
    }

    function removeAddon(val) {
        selectedAddons = selectedAddons.filter(item => item !== val);
        calculatePrice();
    }

    function renderAddons(sizeCategory) {
        const container = document.getElementById("addonTags");
        container.innerHTML = "";
        selectedAddons.forEach(val => {
            const price = getAddonPrice(val, sizeCategory);
            const tag = document.createElement("div");
            tag.className = "addon-tag";
            tag.innerHTML = `${val} (+$${price}) <button onclick="removeAddon('${val}')">×</button>`;
            container.appendChild(tag);
        });
    }

    function getSizeCategoryByCm(cm, species) {
        if (species === "cat") {
            if (cm <= 25) return "cat_small";
            if (cm <= 40) return "cat_medium";
            return "cat_large";
        }
        
        if (cm <= 25) return "small";
        if (cm <= 35) return "med_small";
        if (cm <= 45) return "medium";
        if (cm <= 55) return "med_large";
        if (cm <= 65) return "large";
        if (cm <= 75) return "giant";
        return "super_giant";
    }

    function updateFromBreed() {
        const breedSelect = document.getElementById("breed").value;
        
        if (!breedSelect) {
            currentHairType = "";
            currentSpecies = "dog";
            document.getElementById("hairBadge").innerText = "請先選擇品種";
            document.getElementById("hairBadge").className = "badge warning";
            document.getElementById("lengthCm").value = "";
            calculatePrice();
            return;
        }

        const data = breedData[breedSelect];
        currentHairType = data.hair;
        currentSpecies = data.species || "dog";
        
        const hairBadge = document.getElementById("hairBadge");
        hairBadge.innerText = hairLabels[currentHairType];
        hairBadge.className = "badge"; 
        
        document.getElementById("lengthCm").value = averageLengthMap[data.defaultSize];

        calculatePrice();
    }

    function calculatePrice() {
        const cmInput = document.getElementById("lengthCm").value;
        const sizeBadge = document.getElementById("sizeBadge");
        
        // 決定當前體型 (區分貓狗)
        let cm = parseInt(cmInput);
        let sizeCategory = (cm > 0) ? getSizeCategoryByCm(cm, currentSpecies) : (currentSpecies === "cat" ? "cat_small" : "small");

        // 動態更新下拉選單中的價格文字
        const select = document.getElementById("addonSelect");
        for (let i = 0; i < select.options.length; i++) {
            const option = select.options[i];
            const val = option.value;
            if (val) {
                option.text = `${val} (+$${getAddonPrice(val, sizeCategory)})`;
            }
        }

        // 重新渲染標籤以確保顯示正確價格
        renderAddons(sizeCategory);

        // 計算加購金額總計
        const addonTotal = selectedAddons.reduce((sum, item) => sum + getAddonPrice(item, sizeCategory), 0);
        const addonTotalRow = document.getElementById("addonTotalRow");
        if (addonTotal > 0) {
            addonTotalRow.style.display = "flex";
            document.getElementById("addonTotalBadge").innerText = `+$ ${addonTotal}`;
        } else {
            addonTotalRow.style.display = "none";
        }

        if (!currentHairType || !cmInput || cmInput <= 0) {
            document.getElementById("priceBasic").innerText = `$ ${addonTotal.toLocaleString()}`;
            document.getElementById("pricePremium").innerText = `$ ${addonTotal.toLocaleString()}`;
            sizeBadge.innerText = "請輸入有效體長";
            sizeBadge.className = "badge warning";
            return;
        }

        sizeBadge.innerText = sizeLabels[sizeCategory];
        sizeBadge.className = "badge"; 
        
        const prices = priceMatrix[sizeCategory][currentHairType];
        
        // 將基本報價加上加購金額
        const finalBasic = prices[0] + addonTotal;
        const finalPremium = prices[1] + addonTotal;
        
        document.getElementById("priceBasic").innerText = `$ ${finalBasic.toLocaleString()}`;
        document.getElementById("pricePremium").innerText = `$ ${finalPremium.toLocaleString()}`;
    }

    // 初始化時呼叫一次，讓選單載入預設的選項與價格
    window.onload = function() {
        calculatePrice();
    };
</script>
